<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutPontos – Desempenho Técnico</title>

  <link rel="stylesheet" href="common-nav.css" />
  <link rel="stylesheet" href="classificacao.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .desempenho-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .player-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
    }
    .player-card:hover {
      transform: translateY(-5px);
      border-color: #00ff88;
    }
    .media-badge {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
      padding: 5px 10px;
      border-radius: 10px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    canvas {
      max-width: 250px;
      margin: 15px 0;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <img src="futponts_large.png" alt="Logo" class="brand-logo">
    </div>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    <nav class="app-nav">
      <ul>
        <li><a href="index.html">Classificação</a></li>
        <li><a href="goleiros.html">Goleiros</a></li>
        <li><a href="desempenho.html" class="active">Desempenho</a></li>
        <li><a href="https://media.semdominio.online" target="_blank">Vídeos</a></li>
      </ul>
    </nav>
  </header>

  <main class="app-main">
    <section class="section-header brand">
      <h2>📊 Desempenho Técnico dos Jogadores</h2>
      <p style="text-align: center; opacity: 0.7; margin-top: 10px;">Análise detalhada de habilidades individuais</p>
    </section>

    <div id="desempenhoContainer" class="desempenho-grid">
      <!-- Cards serão inseridos via JS -->
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-content">
      <img src="futponts_large.png" alt="" class="footer-logo" />
      <span></span>
    </div>
  </footer>

  <div id="feedback" aria-live="polite"></div>

  <script type="module" src="globais.js"></script>
  <script type="module" src="desempenho.js"></script>
</body>
</html>
