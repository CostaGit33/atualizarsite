<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutPontos – Desempenho Técnico</title>

  <link rel="stylesheet" href="common-nav.css" />
  <link rel="stylesheet" href="classificacao.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ─────────────────────────────────────────── */
    /* CONTAINER PRINCIPAL                          */
    /* ─────────────────────────────────────────── */
    .desempenho-section {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .desempenho-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    /* ─────────────────────────────────────────── */
    /* CARDS                                         */
    /* ─────────────────────────────────────────── */
    .player-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transition: transform 0.3s ease;
      overflow: hidden;
      word-break: break-word;
    }

    .player-card:hover {
      transform: translateY(-5px);
      border-color: #00ff88;
    }

    .player-card h3 {
      font-size: 1rem;
      margin: 10px 0;
      color: #00ff88;
      text-align: center;
      max-width: 100%;
      overflow-wrap: break-word;
    }

    .media-badge {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
      padding: 5px 10px;
      border-radius: 10px;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    /* ─────────────────────────────────────────── */
    /* CANVAS CONTAINER                             */
    /* ─────────────────────────────────────────── */
    .canvas-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin: 15px 0;
      max-width: 250px;
    }

    canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* ─────────────────────────────────────────── */
    /* RESPONSIVIDADE TABLET (768px)                */
    /* ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .desempenho-section {
        padding: 1.5rem 1rem;
      }

      .desempenho-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .player-card {
        padding: 15px;
      }

      .player-card h3 {
        font-size: 0.95rem;
      }

      .canvas-wrapper {
        max-width: 200px;
      }
    }

    /* ─────────────────────────────────────────── */
    /* RESPONSIVIDADE MOBILE (480px)                */
    /* ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .desempenho-section {
        padding: 1rem 0.75rem;
      }

      .desempenho-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .player-card {
        padding: 12px;
      }

      .player-card h3 {
        font-size: 0.9rem;
      }

      .media-badge {
        font-size: 0.75rem;
        padding: 4px 8px;
      }

      .canvas-wrapper {
        max-width: 150px;
      }
    }
  </style>
</head>
<body>

  <!-- ── BANNER INSTALL PWA ── -->
  <div class="install-banner" id="install-banner" aria-label="Instalar aplicativo">
    <div class="install-banner-text">
      <strong>Instale o FutPontos no seu celular</strong>
      <p>Acesso rápido, tela cheia, funciona offline.</p>
    </div>
    <div class="install-banner-actions">
      <button class="install-btn primary" id="install-confirm">Instalar</button>
      <button class="install-btn" id="install-dismiss">Agora não</button>
    </div>
  </div>

  <header class="app-header">
    <div class="brand">
      <h1 style="margin: 0; font-size: 1.3rem; color: #ffcc00;">FutPontos</h1>
    </div>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    <nav class="app-nav">
      <ul>
        <li><a href="index.html">Classificação</a></li>
        <li><a href="goleiros.html">Goleiros</a></li>
        <li><a href="desempenho.html" class="active">Desempenho</a></li>
        <li><a href="https://media.semdominio.online/index.html" target="_blank">Vídeos</a></li>
      </ul>
    </nav>
  </header>

  <main class="app-main">
    <section class="desempenho-section">
      <header class="section-header">
        <h2>📊 Desempenho Técnico dos Jogadores</h2>
        <p style="text-align: center; opacity: 0.7; margin-top: 10px;">Análise detalhada de habilidades individuais</p>
      </header>

      <div id="desempenhoContainer" class="desempenho-grid">
        <!-- Cards serão inseridos via JS -->
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="footer-content">
      <span>© 2026 • FutPontos</span>
    </div>
  </footer>

  <div id="feedback" aria-live="polite"></div>

  <script type="module" src="globais.js"></script>
  <script src="menu.js"></script>
  <script type="module" src="desempenho.js"></script>

  <!-- ── PWA INSTALL BANNER ── -->
  <script>
    const INSTALL_KEY = "fp_install_dismissed";
    let installPromptEvent = null;

    window.addEventListener("beforeinstallprompt", event => {
      event.preventDefault();
      installPromptEvent = event;

      const dismissed = localStorage.getItem(INSTALL_KEY);
      if (!dismissed) {
        document.getElementById("install-banner").classList.add("visible");
      }
    });

    window.addEventListener("appinstalled", () => {
      installPromptEvent = null;
      document.getElementById("install-banner").classList.remove("visible");
      localStorage.removeItem(INSTALL_KEY);
    });

    document.getElementById("install-confirm")?.addEventListener("click", async () => {
      if (!installPromptEvent) return;
      installPromptEvent.prompt();
      const result = await installPromptEvent.userChoice;
      installPromptEvent = null;
      document.getElementById("install-banner").classList.remove("visible");
      if (result.outcome === "accepted") {
        console.log("PWA instalado.");
      }
    });

    document.getElementById("install-dismiss")?.addEventListener("click", () => {
      localStorage.setItem(INSTALL_KEY, String(Date.now()));
      document.getElementById("install-banner").classList.remove("visible");
    });
  </script>
</body>
</html>
