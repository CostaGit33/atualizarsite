  <!-- CLASSIFICAÇÃO -->
  <script type="module">

    import {
      apiRequest
    } from "./globais.js";

    /* ======================================================
       CARREGAR CLASSIFICAÇÃO
    ====================================================== */

    async function carregarClassificacao() {

      const tbody =
        document.getElementById("playerList");

      try {

        const jogadores =
          await apiRequest("/jogadores");

        if (!Array.isArray(jogadores)) {
          throw new Error("API inválida");
        }

        /* =========================================
           ORDENAÇÃO
        ========================================= */

        jogadores.sort((a, b) => {

          return (
            (Number(b.pontos) || 0) -
            (Number(a.pontos) || 0)
          );

        });

        /* =========================================
           TABELA
        ========================================= */

        tbody.innerHTML = jogadores.map((j, index) => {

          return `
            <tr>

              <td>
                ${index + 1}
              </td>

              <td>
                ${escapeHtml(j.nome || "-")}
              </td>

              <td>
                <strong>
                  ${Number(j.pontos) || 0}
                </strong>
              </td>

              <td>
                ${Number(j.vitorias) || 0}
              </td>

              <td>
                ${Number(j.gols) || 0}
              </td>

              <td>
                ${Number(j.defesa) || 0}
              </td>

              <td>
                ${Number(j.empate) || 0}
              </td>

              <td>
                ${Number(j.infracoes) || 0}
              </td>

            </tr>
          `;

        }).join("");

        /* =========================================
           SEM DADOS
        ========================================= */

        if (jogadores.length === 0) {

          tbody.innerHTML = `
            <tr>
              <td colspan="8">
                Nenhum jogador cadastrado.
              </td>
            </tr>
          `;
        }

      } catch (error) {

        console.error(
          "Erro ao carregar classificação:",
          error
        );

        tbody.innerHTML = `
          <tr>
            <td colspan="8">
              Erro ao carregar classificação.
            </td>
          </tr>
        `;
      }
    }

    /* ======================================================
       SEGURANÇA HTML
    ====================================================== */

    function escapeHtml(text = "") {

      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /* ======================================================
       INIT
    ====================================================== */

    document.addEventListener(
      "DOMContentLoaded",
      () => {

        carregarClassificacao();

      }
    );

  </script>
