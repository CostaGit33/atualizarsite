<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FutPontos • Classificação Geral de Futebol Society</title>

  <meta name="description" content="Ranking visual, classificação geral, estatísticas e desempenho dos jogadores no FutPontos." />
  <meta name="keywords" content="futebol society, ranking futebol, classificação futebol, futpontos, jogadores, desempenho" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://semdominio.online/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="FutPontos • Classificação Geral" />
  <meta property="og:description" content="Veja ranking, estatísticas e desempenho dos jogadores." />
  <meta property="og:image" content="https://semdominio.online/futponts_large.png" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#07080D" />

  <link rel="icon" href="futponts_large.png" type="image/png" />
  <link rel="apple-touch-icon" href="futponts_large.png" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VVYJFM295R"></script>

  <link rel="stylesheet" href="common-nav.css" />
  <link rel="stylesheet" href="classificacao.css" />

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .app-main {
      width: min(1400px, 95%);
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <img src="futponts_large.png" class="brand-logo" alt="Logo FutPontos" loading="lazy" />
    </div>

    <button class="menu-toggle" aria-label="Abrir menu">☰</button>

    <nav class="app-nav" aria-label="Navegação principal">
      <ul>
        <li><a href="index.html" class="active">Classificação</a></li>
        <li><a href="goleiros.html">Goleiros</a></li>
        <li><a href="desempenho.html">Desempenho</a></li>
        <li><a href="https://media.semdominio.online/index.html" target="_blank" rel="noopener noreferrer">Vídeos</a></li>
      </ul>
    </nav>
  </header>

  <main class="app-main">
    <section class="classification-section">
      <header class="section-header">
        <h1>Classificação Geral Individual</h1>
      </header>

      <div class="table-wrapper">
        <table aria-label="Tabela de classificação geral dos jogadores">
          <thead>
            <tr>
              <th>#</th>
              <th>Jogador</th>
              <th>Pontos</th>
              <th>Vitórias</th>
              <th>Gols</th>
              <th>Defesas</th>
              <th>Empates</th>
              <th>Infrações</th>
            </tr>
          </thead>

          <tbody id="playerList">
            <tr>
              <td colspan="8">Carregando classificação...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="cards-section">
      <header class="section-header">
        <h2>Ranking Visual</h2>
      </header>

      <div id="rankingCards" class="cards" aria-live="polite"></div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="footer-content">
      <span>© 2026 • FutPontos • semdominio.online</span>
    </div>
  </footer>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VVYJFM295R');
  </script>

  <script type="module" src="./globais.js"></script>
  <script src="menu.js"></script>

  <script type="module">
    import { apiRequest } from './globais.js';

    async function carregarClassificacao() {
      try {
        const jogadores = await apiRequest('/jogadores');

        if (!Array.isArray(jogadores)) {
          throw new Error('API inválida');
        }

        jogadores.sort((a, b) => (b.pontos || 0) - (a.pontos || 0));

        const tbody = document.getElementById('playerList');
        const cards = document.getElementById('rankingCards');

        tbody.innerHTML = jogadores.map((j, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${j.nome || '-'} </td>
            <td>${j.pontos || 0}</td>
            <td>${j.vitorias || 0}</td>
            <td>${j.gols || 0}</td>
            <td>${j.defesa || j.defesas || 0}</td>
            <td>${j.empate || j.empates || 0}</td>
            <td>${j.infracoes || 0}</td>
          </tr>
        `).join('');

        cards.innerHTML = jogadores.map((j, i) => `
          <div class="player-card">
            <div class="player-rank">#${i + 1}</div>
            <div class="player-name">${j.nome || '-'}</div>
            <div class="player-points">${j.pontos || 0} pts</div>
          </div>
        `).join('');

      } catch (error) {
        console.error(error);
        document.getElementById('playerList').innerHTML = '<tr><td colspan="8">Erro ao carregar classificação.</td></tr>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      carregarClassificacao();

      const btn = document.querySelector('.menu-toggle');
      const nav = document.querySelector('.app-nav');

      if (btn && nav) {
        btn.addEventListener('click', () => {
          nav.classList.toggle('active');
        });
      }
    });
  </script>

</body>
</html>
