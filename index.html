<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classificação • FutPontos</title>
  <meta name="description" content="Classificação geral individual e ranking visual FutPontos." />

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VVYJFM295R"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VVYJFM295R', {
      anonymize_ip: true,
      page_title: document.title,
      page_path: window.location.pathname
    });
  </script>

  <link rel="stylesheet" href="common-nav.css" />
  <link rel="stylesheet" href="classificacao.css" />

  <style>
    /* ── ANIMAÇÕES GLOBAIS ───────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes progressFill {
      from { width: 0; }
    }

    /* ── TABELA — melhorias mínimas ──────────── */

    /* Linha hover suave */
    #playerList tr {
      transition: background .15s;
      animation: fadeUp .3s ease both;
    }
    #playerList tr:hover {
      background: rgba(255,255,255,.03);
      cursor: default;
    }

    /* Tendência ao lado do número da posição */
    .trend {
      font-size: .65rem;
      font-weight: 700;
      margin-left: .25rem;
      vertical-align: middle;
      letter-spacing: 0;
    }
    .trend-up   { color: #27c97e; }
    .trend-down { color: #e8445a; }

    /* Link no nome do jogador */
    .player-link {
      color: inherit;
      text-decoration: none;
      transition: opacity .15s;
    }
    .player-link:hover { opacity: .7; }

    /* Barra de progresso na coluna P */
    .pts-cell {
      position: relative;
      white-space: nowrap;
    }
    .pts-bar {
      display: block;
      height: 2px;
      border-radius: 1px;
      background: rgba(255,255,255,.08);
      margin-top: 3px;
      overflow: hidden;
    }
    .pts-bar-fill {
      display: block;
      height: 100%;
      border-radius: 1px;
      animation: progressFill .7s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Tooltip de breakdown ao hover na célula de pontos */
    .pts-wrap {
      position: relative;
      display: inline-block;
      cursor: default;
    }
    .pts-tip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--surface-color, #1c1c1c);
      border: 1px solid var(--border-color, #2e2e2e);
      border-radius: 8px;
      padding: .55rem .75rem;
      min-width: 160px;
      font-size: .72rem;
      line-height: 1.6;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s, transform .18s;
      text-align: left;
      white-space: nowrap;
    }
    .pts-tip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--border-color, #2e2e2e);
    }
    .pts-wrap:hover .pts-tip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .bd-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      opacity: .65;
    }
    .bd-row span:last-child { opacity: 1; font-weight: 600; }
    .bd-sep {
      border: none;
      border-top: 1px solid var(--border-color, #2e2e2e);
      margin: .3rem 0;
    }
    .bd-total {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-weight: 700;
    }

    /* Infrações destacadas */
    .inf-warn { color: #e8445a; }

    /* ── RANKING VISUAL — melhorias ──────────── */
    #rankingCards .player-card {
      animation: fadeUp .4s ease both;
      transition: transform .2s, box-shadow .2s;
    }
    #rankingCards .player-card:hover {
      transform: translateY(-3px);
    }

    /* Barra de progresso no card */
    .card-progress {
      margin: .6rem 0 .4rem;
    }
    .card-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .65rem;
      opacity: .45;
      margin-bottom: .3rem;
    }
    .card-progress .pts-bar {
      background: rgba(255,255,255,.08);
    }
    .card-progress .pts-bar-fill {
      animation-delay: .2s;
    }

    /* Diferença para o líder */
    .pts-diff {
      font-size: .72rem;
      opacity: .45;
      margin-left: .3rem;
    }

    /* ── SPINNER ─────────────────────────────── */
    .fp-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: 2.5rem 1rem;
      opacity: .4;
      font-size: .8rem;
      letter-spacing: .1em;
    }
    .fp-loading i {
      display: inline-flex;
      gap: 4px;
    }
    .fp-loading i span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: fadeIn .9s ease infinite alternate;
    }
    .fp-loading i span:nth-child(2) { animation-delay: .2s; }
    .fp-loading i span:nth-child(3) { animation-delay: .4s; }

    .fp-error {
      padding: 2rem;
      text-align: center;
      opacity: .45;
      font-size: .85rem;
    }
  </style>
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header class="app-header">
    <div class="brand">
      <img src="futponts_large.png" alt="" aria-hidden="true" class="brand-logo" />
    </div>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    <nav class="app-nav">
      <ul>
        <li><a href="index.html" class="active">Classificação</a></li>
        <li><a href="goleiros.html">Goleiros</a></li>
      </ul>
    </nav>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="app-main">

    <!-- ===== CLASSIFICAÇÃO ===== -->
    <section class="classification-section">
      <header class="section-header">
        <h2>Classificação Geral Individual</h2>
      </header>
      <div class="table-wrapper">
        <img src="futponts_large.png" alt="" aria-hidden="true" class="table-watermark" />
        <table aria-label="Tabela de classificação geral">
          <thead>
            <tr>
              <th>#</th>
              <th>Jog</th>
              <th>P</th>
              <th>V</th>
              <th>G</th>
              <th>D</th>
              <th>E</th>
              <th>INF</th>
            </tr>
          </thead>
          <tbody id="playerList">
            <tr>
              <td colspan="8">
                <div class="fp-loading"><i><span></span><span></span><span></span></i> Carregando...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== RANKING VISUAL ===== -->
    <section class="cards-section">
      <header class="section-header">
        <h2>Ranking Visual</h2>
      </header>
      <div id="rankingCards" class="cards" aria-live="polite"></div>
    </section>

  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="app-footer">
    <div class="footer-content">
      <img src="futponts_large.png" alt="" aria-hidden="true" class="footer-logo" />
      <span>© 2026 • FutPontos</span>
    </div>
  </footer>

  <div id="feedback" aria-live="polite"></div>

  <script type="module" src="./globais.js"></script>

  <script type="module">
    import { apiRequest, calculatePoints, showFeedback } from "./globais.js";

    /* ── CONFIG ──────────────────────────────── */
    const ENDPOINT        = "/jogadores";
    const UPDATE_INTERVAL = 10000;
    const PREV_KEY        = "fp_prev_rank";

    /* ── PESOS ────────────────────────────────
       Ajuste conforme sua função calculatePoints
       em globais.js, ou remova e use a importada.
    ─────────────────────────────────────────── */
    const W = { vitorias: 3, empates: 1, gols: 1, defesas: 1, infracoes: -2 };

    function pontuacao(j) {
      if (typeof calculatePoints === "function") {
        return calculatePoints(j.vitorias, j.empates, j.defesas, j.gols, j.infracoes);
      }
      return j.vitorias  * W.vitorias
           + j.empates   * W.empates
           + j.gols      * W.gols
           + j.defesas   * W.defesas
           + j.infracoes * W.infracoes;
    }

    /* ── NORMALIZA campos da API ─────────────── */
    function normaliza(j) {
      j.vitorias  = Number(j.vitorias)  || 0;
      j.empates   = Number(j.empate)    || 0; // API retorna "empate"
      j.defesas   = Number(j.defesa)    || 0; // API retorna "defesa"
      j.gols      = Number(j.gols)      || 0;
      j.infracoes = Number(j.infracoes) || 0;
      j.pontos    = Number(j.pontos)    || pontuacao(j);
    }

    /* ── TENDÊNCIA ───────────────────────────── */
    function salvarPrev(players) {
      try {
        const snap = {};
        players.forEach((p, i) => snap[p.id] = i + 1);
        localStorage.setItem(PREV_KEY, JSON.stringify(snap));
      } catch {}
    }

    function tendencia(id, rank) {
      try {
        const prev = JSON.parse(localStorage.getItem(PREV_KEY) || "{}");
        const p = prev[id];
        if (p === undefined) return "";
        if (p > rank) return `<span class="trend trend-up"   title="Subiu ${p-rank}">▲</span>`;
        if (p < rank) return `<span class="trend trend-down" title="Caiu ${rank-p}">▼</span>`;
        return "";
      } catch { return ""; }
    }

    /* ── BREAKDOWN ───────────────────────────── */
    function breakdown(j) {
      const linhas = [
        { label: "Vitórias",   val: j.vitorias,  mult: W.vitorias  },
        { label: "Empates",    val: j.empates,   mult: W.empates   },
        { label: "Gols",       val: j.gols,      mult: W.gols      },
        { label: "Defesas",    val: j.defesas,   mult: W.defesas   },
        { label: "Infrações",  val: j.infracoes, mult: W.infracoes },
      ].filter(r => r.val > 0 || (r.val > 0 && r.mult < 0));

      const total = j.pontos;

      return `<div class="pts-wrap">
        ${total}
        <div class="pts-tip">
          ${linhas.map(r => {
            const pts = r.val * r.mult;
            return `<div class="bd-row">
              <span>${r.label} ×${r.val}</span>
              <span>${pts >= 0 ? "+" : ""}${pts}</span>
            </div>`;
          }).join("")}
          <hr class="bd-sep">
          <div class="bd-total"><span>Total</span><span>${total}</span></div>
        </div>
      </div>`;
    }

    /* ── TABELA ──────────────────────────────── */
    function renderTabela(players) {
      const tbody  = document.getElementById("playerList");
      const maxPts = players[0]?.pontos || 1;

      if (!players.length) {
        tbody.innerHTML = '<tr><td colspan="8"><p class="fp-error">Nenhum jogador cadastrado.</p></td></tr>';
        return;
      }

      tbody.innerHTML = players.map((j, i) => {
        const rank     = i + 1;
        const trend    = tendencia(j.id, rank);
        const pct      = Math.round((j.pontos / maxPts) * 100);
        const barColor = `var(--accent-color, #4caf50)`;
        const delay    = `${Math.min(i, 12) * 0.04}s`;

        return `<tr style="animation-delay:${delay}">
          <td>${rank}${trend}</td>
          <td>
            <a href="jogador.html?id=${j.id}" class="player-link">${j.nome}</a>
          </td>
          <td class="pts-cell">
            ${breakdown(j)}
            <span class="pts-bar">
              <span class="pts-bar-fill"
                style="width:${pct}%; background:${barColor}; animation-delay:${delay}">
              </span>
            </span>
          </td>
          <td>${j.vitorias}</td>
          <td>${j.gols}</td>
          <td>${j.defesas}</td>
          <td>${j.empates}</td>
          <td class="${j.infracoes > 0 ? "inf-warn" : ""}">${j.infracoes}</td>
        </tr>`;
      }).join("");
    }

    /* ── CARDS ───────────────────────────────── */
    function renderCards(players) {
      const container = document.getElementById("rankingCards");
      const maxPts    = players[0]?.pontos || 1;

      if (!players.length) {
        container.innerHTML = '<p class="fp-error">Nenhum jogador cadastrado.</p>';
        return;
      }

      container.innerHTML = players.map((j, i) => {
        const rank        = i + 1;
        const pct         = Math.round((j.pontos / maxPts) * 100);
        const ptsToLeader = i === 0 ? 0 : players[0].pontos - j.pontos;
        const delay       = `${Math.min(i, 10) * 0.05}s`;
        const barColor    = `var(--accent-color, #4caf50)`;
        const trend       = tendencia(j.id, rank);

        return `<div class="player-card" style="animation-delay:${delay}">
          <div class="player-rank">#${rank}</div>

          <div class="player-name">
            <a href="jogador.html?id=${j.id}" class="player-link">${j.nome}</a>
            ${trend}
          </div>

          <div class="player-points">
            ${j.pontos} pts
            ${ptsToLeader > 0
              ? `<span class="pts-diff">−${ptsToLeader} do líder</span>`
              : ""}
          </div>

          <div class="card-progress">
            <div class="card-progress-label">
              <span>vs. líder</span><span>${pct}%</span>
            </div>
            <span class="pts-bar">
              <span class="pts-bar-fill"
                style="width:${pct}%; background:${barColor}; animation-delay:${delay}">
              </span>
            </span>
          </div>

          <div class="player-stats">
            <span>V ${j.vitorias}</span>
            <span>G ${j.gols}</span>
            <span>D ${j.defesas}</span>
            <span>E ${j.empates}</span>
          </div>
        </div>`;
      }).join("");
    }

    /* ── LOAD ────────────────────────────────── */
    async function carregarClassificacao() {
      try {
        const jogadores = await apiRequest(ENDPOINT);
        if (!Array.isArray(jogadores)) throw new Error("Resposta inválida da API");

        jogadores.forEach(normaliza);
        jogadores.sort((a, b) => b.pontos - a.pontos);

        renderTabela(jogadores);
        renderCards(jogadores);
        salvarPrev(jogadores);

      } catch (err) {
        console.error("Erro ao carregar classificação:", err);

        document.getElementById("playerList").innerHTML =
          `<tr><td colspan="8"><p class="fp-error">Erro ao carregar dados.</p></td></tr>`;
        document.getElementById("rankingCards").innerHTML =
          `<p class="fp-error">Erro ao carregar dados.</p>`;
      }
    }

    /* ── INIT ────────────────────────────────── */
    document.addEventListener("DOMContentLoaded", () => {
      carregarClassificacao();
      setInterval(carregarClassificacao, UPDATE_INTERVAL);
    });
  </script>

</body>
</html>
