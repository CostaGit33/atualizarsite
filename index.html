  <!-- ESTILOS EXTRAS -->
  <style>

    * {
      box-sizing: border-box;
    }

    body {
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }

    .app-main {
      width: min(1400px, 95%);
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: center;
      padding: 12px;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(
        auto-fit,
        minmax(220px, 1fr)
      );
      gap: 18px;
      margin-top: 20px;
    }

    .player-card {
      position: relative;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      transition: transform .2s ease;
    }

    .player-card:hover {
      transform: translateY(-4px);
    }

    .player-rank {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .player-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .player-points {
      font-size: 1.5rem;
      font-weight: bold;
      color: #00ff88;
      margin-bottom: 12px;
    }

    .player-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .loading,
    .error {
      text-align: center;
      padding: 20px;
    }

    .top-1 {
      border: 1px solid gold;
    }

    .top-2 {
      border: 1px solid silver;
    }

    .top-3 {
      border: 1px solid #cd7f32;
    }

    @media (max-width: 768px) {

      th,
      td {
        font-size: 0.85rem;
        padding: 10px;
      }

      .player-card {
        padding: 16px;
      }

    }

  </style>

</head>

<body>

  <!-- HEADER -->
  <header class="app-header">

    <div class="brand">
      <img
        src="futponts_large.png"
        class="brand-logo"
        alt="Logo FutPontos"
        loading="lazy"
      />
    </div>

    <button
      class="menu-toggle"
      aria-label="Abrir menu"
    >
      ☰
    </button>

    <nav
      class="app-nav"
      aria-label="Navegação principal"
    >

      <ul>
        <li>
          <a
            href="index.html"
            class="active"
          >
            Classificação
          </a>
        </li>

        <li>
          <a href="goleiros.html">
            Goleiros
          </a>
        </li>

        <li>
          <a href="desempenho.html">
            Desempenho
          </a>
        </li>

        <li>
          <a
            href="https://media.semdominio.online/index.html"
            target="_blank"
            rel="noopener noreferrer"
          >
            Vídeos
          </a>
        </li>
      </ul>

    </nav>

  </header>

  <!-- MAIN -->
  <main class="app-main">

    <!-- TABELA -->
    <section class="classification-section">

      <header class="section-header">
        <h1>
          Classificação Geral Individual
        </h1>
      </header>

      <div class="table-wrapper">

        <table
          aria-label="Tabela de classificação geral dos jogadores"
        >

          <thead>

            <tr>
              <th>#</th>
              <th>Jogador</th>
              <th>Pontos</th>
              <th>Vitórias</th>
              <th>Gols</th>
              <th>Defesas</th>
              <th>Empates</th>
              <th>Infrações</th>
            </tr>

          </thead>

          <tbody id="playerList">

            <tr>
              <td colspan="8">
                Carregando classificação...
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </section>

    <!-- CARDS -->
    <section class="cards-section">

      <header class="section-header">
        <h2>
          Ranking Visual
        </h2>
      </header>

      <div
        id="rankingCards"
        class="cards"
        aria-live="polite"
      ></div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="app-footer">

    <div class="footer-content">
      <span>
        © 2026 • FutPontos • semdominio.online
      </span>
    </div>

  </footer>

  <!-- MENU -->
  <script src="menu.js"></script>

  <!-- CLASSIFICAÇÃO -->
  <script type="module">

    import {
      apiRequest
    } from "./globais.js";

    /* ======================================================
       CARREGAR CLASSIFICAÇÃO
    ====================================================== */

    async function carregarClassificacao() {

      const tbody =
        document.getElementById("playerList");

      const cards =
        document.getElementById("rankingCards");

      try {

        const jogadores =
          await apiRequest("/jogadores");

        if (!Array.isArray(jogadores)) {
          throw new Error("API inválida");
        }

        /* =========================================
           ORDENAÇÃO
        ========================================= */

        jogadores.sort((a, b) => {

          return (
            (Number(b.pontos) || 0) -
            (Number(a.pontos) || 0)
          );

        });

        /* =========================================
           TABELA
        ========================================= */

        tbody.innerHTML = jogadores.map((j, index) => {

          return `
            <tr>

              <td>
                ${index + 1}
              </td>

              <td>
                ${escapeHtml(j.nome || "-")}
              </td>

              <td>
                <strong>
                  ${Number(j.pontos) || 0}
                </strong>
              </td>

              <td>
                ${Number(j.vitorias) || 0}
              </td>

              <td>
                ${Number(j.gols) || 0}
              </td>

              <td>
                ${Number(j.defesa) || 0}
              </td>

              <td>
                ${Number(j.empate) || 0}
              </td>

              <td>
                ${Number(j.infracoes) || 0}
              </td>

            </tr>
          `;

        }).join("");

        /* =========================================
           CARDS
        ========================================= */

        cards.innerHTML = jogadores.map((j, index) => {

          let topClass = "";

          if (index === 0) {
            topClass = "top-1";
          }

          else if (index === 1) {
            topClass = "top-2";
          }

          else if (index === 2) {
            topClass = "top-3";
          }

          return `
            <div class="player-card ${topClass}">

              <div class="player-rank">
                #${index + 1}
              </div>

              <div class="player-name">
                ${escapeHtml(j.nome || "-")}
              </div>

              <div class="player-points">
                ${Number(j.pontos) || 0} pts
              </div>

              <div class="player-stats">

                <span>
                  🏆 ${Number(j.vitorias) || 0}
                </span>

                <span>
                  ⚽ ${Number(j.gols) || 0}
                </span>

                <span>
                  🧤 ${Number(j.defesa) || 0}
                </span>

                <span>
                  🤝 ${Number(j.empate) || 0}
                </span>

              </div>

            </div>
          `;

        }).join("");

        /* =========================================
           SEM DADOS
        ========================================= */

        if (jogadores.length === 0) {

          tbody.innerHTML = `
            <tr>
              <td colspan="8">
                Nenhum jogador cadastrado.
              </td>
            </tr>
          `;

          cards.innerHTML = `
            <div class="error">
              Nenhum jogador encontrado.
            </div>
          `;
        }

      } catch (error) {

        console.error(
          "Erro ao carregar classificação:",
          error
        );

        tbody.innerHTML = `
          <tr>
            <td colspan="8">
              Erro ao carregar classificação.
            </td>
          </tr>
        `;

        cards.innerHTML = `
          <div class="error">
            Erro ao carregar ranking.
          </div>
        `;
      }
    }

    /* ======================================================
       MENU MOBILE
    ====================================================== */

    function initMenu() {

      const btn =
        document.querySelector(".menu-toggle");

      const nav =
        document.querySelector(".app-nav");

      if (!btn || !nav) {
        return;
      }

      btn.addEventListener("click", () => {
        nav.classList.toggle("active");
      });
    }

    /* ======================================================
       SEGURANÇA HTML
    ====================================================== */

    function escapeHtml(text = "") {

      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /* ======================================================
       INIT
    ====================================================== */

    document.addEventListener(
      "DOMContentLoaded",
      () => {

        carregarClassificacao();

        initMenu();

      }
    );

  </script>

</body>
</html>
